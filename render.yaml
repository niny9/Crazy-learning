services:
  - type: web
    name: crazy-learning
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: ZHIPU_MODEL
        value: glm-4-flash
      - key: ZHIPU_VISION_MODEL
        value: glm-4.6v-flash
      - key: ZHIPU_API_KEY
        sync: false
      - key: TTS_MODEL
        value: sambert-eva-v1
      - key: ASR_MODEL
        value: paraformer-v2
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLIPPER_SHARED_SECRET
        sync: false
