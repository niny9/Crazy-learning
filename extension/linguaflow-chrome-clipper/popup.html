<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云湖 划词助手</title>
    <style>
      body {
        margin: 0;
        width: 360px;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #fff8fb;
        color: #1f2937;
      }
      .card {
        background: white;
        border: 1px solid #f3d7e6;
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 8px 24px rgba(244, 114, 182, 0.08);
      }
      .label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #ec4899;
        margin-bottom: 8px;
      }
      textarea, input, select, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 14px;
        border: 1px solid #f1d5e4;
        padding: 10px 12px;
        font-size: 14px;
      }
      textarea {
        resize: none;
        min-height: 84px;
      }
      button {
        border: 0;
        background: #ec4899;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }
      .secondary {
        background: #fdf2f8;
        color: #be185d;
      }
      .grid {
        display: grid;
        gap: 10px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.5;
      }
      .status {
        font-size: 12px;
        color: #be185d;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div class="label">当前选中内容</div>
        <textarea id="clipText" placeholder="先在网页里划词或划句，再打开插件。"></textarea>
        <div class="row" style="margin-top: 10px;">
          <select id="clipType">
            <option value="word">单词</option>
            <option value="sentence">句子</option>
          </select>
          <input id="clipSource" placeholder="文章来源标题" />
        </div>
        <div class="row" style="margin-top: 10px;">
          <button id="saveWord">存到单词本</button>
          <button id="saveSentence" class="secondary">存到句子库</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="card">
        <div class="label">云湖地址</div>
        <input id="targetUrl" placeholder="https://crazy-learning.onrender.com" />
        <div class="hint" style="margin-top: 8px;">如果你之后换成自己的域名，在这里改掉就行。</div>
      </div>

      <div class="card">
        <div class="label">直接保存</div>
        <div class="grid">
          <input id="clipperToken" type="password" placeholder="你的插件连接码" />
        </div>
        <div class="hint" style="margin-top: 8px;">先去云湖账号弹窗里点“生成连接码”，复制后贴到这里。没填也能用，只是会退回到打开网页保存。</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
