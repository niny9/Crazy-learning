<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云湖 划词助手</title>
    <style>
      body {
        margin: 0;
        width: 360px;
        padding: 16px;
        font-family: "Quicksand", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 205, 229, 0.58), transparent 34%),
          radial-gradient(circle at 82% 18%, rgba(173, 231, 255, 0.52), transparent 28%),
          linear-gradient(180deg, #fffdfd 0%, #fff6fb 55%, #f7fbff 100%);
        color: #1f2937;
      }
      .card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.62));
        border: 1px solid rgba(255, 255, 255, 0.82);
        border-radius: 20px;
        padding: 14px;
        box-shadow:
          0 16px 38px rgba(149, 163, 206, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px) saturate(150%);
      }
      .label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: #ec4899;
        margin-bottom: 8px;
      }
      textarea, input, select, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.82);
        padding: 10px 12px;
        font-size: 14px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.92);
      }
      textarea {
        resize: none;
        min-height: 84px;
      }
      button {
        border: 0;
        background: linear-gradient(135deg, #ff4d9c, #9d78ff);
        color: white;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(255, 77, 156, 0.2);
      }
      .secondary {
        background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
        color: #be185d;
        border: 1px solid rgba(255,255,255,0.88);
        box-shadow: 0 10px 22px rgba(149, 163, 206, 0.14);
      }
      .grid {
        display: grid;
        gap: 10px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .hint {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.5;
      }
      .status {
        font-size: 12px;
        color: #be185d;
        margin-top: 8px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      .logo {
        width: 44px;
        height: 44px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        color: white;
        font-size: 20px;
        background: linear-gradient(145deg, #ff5fa8, #9d78ff 58%, #77dce8);
        box-shadow: 0 14px 26px rgba(255, 95, 168, 0.24);
      }
      .brand-title {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #17203a;
      }
      .brand-sub {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="brand">
        <div class="logo">☁</div>
        <div>
          <div class="brand-title">云湖</div>
          <div class="brand-sub">clip helper</div>
        </div>
      </div>
      <div class="card">
        <div class="label">当前选中内容</div>
        <textarea id="clipText" placeholder="先在网页里划词或划句，再打开插件。"></textarea>
        <div class="row" style="margin-top: 10px;">
          <select id="clipType">
            <option value="word">单词</option>
            <option value="sentence">句子</option>
          </select>
          <input id="clipSource" placeholder="文章来源标题" />
        </div>
        <div class="row" style="margin-top: 10px;">
          <button id="saveWord">存到单词本</button>
          <button id="saveSentence" class="secondary">存到句子库</button>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="card">
        <div class="label">云湖地址</div>
        <input id="targetUrl" placeholder="https://crazy-learning.onrender.com" />
        <div class="hint" style="margin-top: 8px;">如果你之后换成自己的域名，在这里改掉就行。</div>
      </div>

      <div class="card">
        <div class="label">直接保存</div>
        <div class="grid">
          <input id="clipperToken" type="password" placeholder="你的插件连接码" />
        </div>
        <div class="hint" style="margin-top: 8px;">先去云湖账号弹窗里点“生成连接码”，复制后贴到这里。没填也能用，只是会退回到打开网页保存。</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
